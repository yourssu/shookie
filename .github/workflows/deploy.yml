name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/shookie
            git pull origin main
            docker stop shookie-bot || true
            docker rm shookie-bot || true
            docker compose down || true
            docker compose build
            SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }} \
            SLACK_APP_TOKEN=${{ secrets.SLACK_APP_TOKEN }} \
            LLM_API_KEY=${{ secrets.LLM_API_KEY }} \
            LLM_BASE_URL=https://api.deepseek.com \
            POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }} \
            GITHUB_APP_ID=${{ secrets.GITHUB_APP_ID }} \
            GITHUB_PRIVATE_KEY=${{ secrets.GITHUB_PRIVATE_KEY }} \
            GITHUB_INSTALLATION_ID=${{ secrets.GITHUB_INSTALLATION_ID }} \
            THREAD_WORKSPACE_BASE_PATH=/tmp/shookie-workspaces \
            THREAD_WORKSPACE_MAX_GB=5 \
            LOG_LEVEL=debug \
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            docker compose up -d
